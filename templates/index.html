<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
            background: #343541;
            color: white;
        }

        .sidebar {
            width: 250px;
            background: #202123;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .new-chat {
            background: #444654;
            padding: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            text-align: center;
            border-radius: 5px;
        }

        .history {
            flex: 1;
            overflow-y: auto;
        }

        .history div {
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }

        .history div:hover {
            background: #2a2b32;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 10px;
            background: #202123;
            display: flex;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .chat-header button {
            margin-left: 5px;
            padding: 6px 10px;
            border-radius: 5px;
            border: none;
            background: #444654;
            color: white;
            cursor: pointer;
        }

        .delete-btn {
            background: red;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .user, .bot {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 70%;
            white-space: pre-wrap;
        }

        .user {
            background: #4CAF50;
            margin-left: auto;
        }

        .bot {
            background: #444654;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #40414f;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        button.send {
            margin-left: 10px;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="new-chat" onclick="newChat()">+ New Chat</div>
    <div class="history" id="history"></div>
</div>

<!-- CHAT -->
<div class="chat-container">

    <div class="chat-header">
        <button onclick="downloadChat()">Download</button>
        <button onclick="editLast()">Edit Last</button>
        <button onclick="clearChat()">Clear</button>
        <button onclick="renameChat()">Rename</button>
        <button class="delete-btn" onclick="deleteCurrentChat()">Delete</button>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="file" id="fileInput">
        <input type="text" id="message" placeholder="Type a message..." onkeydown="handleEnter(event)">
        <button class="send" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

let currentChatId = null;

// ENTER
function handleEnter(e) {
    if (e.key === "Enter") sendMessage();
}

// LOADING
function showLoading() {
    let div = document.createElement("div");
    div.id = "loading";
    div.className = "bot";
    div.innerText = "Thinking...";
    document.getElementById("chatBox").appendChild(div);
}

function removeLoading() {
    let el = document.getElementById("loading");
    if (el) el.remove();
}

// SEND MESSAGE
async function sendMessage(editText=null) {
    let input = document.getElementById("message");
    let msg = editText || input.value.trim();
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    showLoading();

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: msg})
        });

        let data = await res.json();
        removeLoading();

        if (data.image_url) addMessage(data, "bot");
        else addMessage(data.response, "bot");

        loadChats();

    } catch {
        removeLoading();
        addMessage("Error ❌", "bot");
    }
}

// ADD MESSAGE
function addMessage(msg, type) {
    let div = document.createElement("div");
    div.className = type;

    if (typeof msg === "object" && msg.image_url) {
        div.innerHTML = `<p>${msg.response}</p><img src="${msg.image_url}" width="300">`;
    }
    else if (typeof msg === "object" && msg.image) {
        div.innerHTML = `<p>${msg.user}</p><img src="${msg.image}" width="300">`;
    }
    else {
        div.innerText = msg;
    }

    let box = document.getElementById("chatBox");
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// LOAD CHATS
async function loadChats() {
    let res = await fetch("/get_chats");
    let chats = await res.json();

    let historyDiv = document.getElementById("history");
    historyDiv.innerHTML = "";

    chats.forEach(chat => {
        let div = document.createElement("div");
        div.innerText = chat.title;
        div.onclick = () => openChat(chat.id);
        historyDiv.appendChild(div);
    });
}

// OPEN CHAT
async function openChat(chatId) {
    currentChatId = chatId;

    let res = await fetch(`/get_messages/${chatId}`);
    let data = await res.json();

    let chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    data.forEach(msg => {
        if (msg.image) {
            addMessage(msg, "bot");
        } else {
            addMessage(msg.user, "user");
            addMessage(msg.bot, "bot");
        }
    });
}

// DELETE CHAT
async function deleteCurrentChat() {
    if (!currentChatId) return alert("No chat selected");

    if (!confirm("Delete this chat?")) return;

    await fetch(`/delete_chat/${currentChatId}`, {method: "DELETE"});
    document.getElementById("chatBox").innerHTML = "";
    currentChatId = null;
    loadChats();
}

// NEW CHAT
async function newChat() {
    await fetch("/new_chat", {method: "POST"});
    document.getElementById("chatBox").innerHTML = "";
    currentChatId = null;
    loadChats();
}

// EDIT LAST
function editLast() {
    let msgs = document.querySelectorAll(".user");
    if (!msgs.length) return;

    let last = msgs[msgs.length - 1];
    document.getElementById("message").value = last.innerText;

    last.remove();
    let bots = document.querySelectorAll(".bot");
    if (bots.length) bots[bots.length - 1].remove();
}

// DOWNLOAD
function downloadChat() {
    if (!currentChatId) return;
    window.location.href = `/download/${currentChatId}`;
}

// CLEAR
function clearChat() {
    if (!currentChatId) return;

    fetch(`/clear_chat/${currentChatId}`, {method: "DELETE"})
    .then(() => document.getElementById("chatBox").innerHTML = "");
}

// RENAME
function renameChat() {
    let name = prompt("Enter new name:");
    if (!name || !currentChatId) return;

    fetch("/rename_chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({chat_id: currentChatId, title: name})
    }).then(loadChats);
}

// FILE UPLOAD
document.getElementById("fileInput").addEventListener("change", async function() {
    let file = this.files[0];
    if (!file) return;

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    addMessage(data.response, "bot");
});

// INIT
window.onload = loadChats;

</script>

</body>
</html>
